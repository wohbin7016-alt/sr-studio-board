<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SR스튜디오">
  <title>SR스튜디오 Analytics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">SR<span>스튜디오</span> <small>Analytics</small></div>
      <nav class="menu">
        <button class="menu-item" data-page="ops">🏭 <span>운영현황</span></button>
        <button class="menu-item" data-page="dashboard">📊 <span>대시보드</span></button>
        <button class="menu-item" data-page="channels">📺 <span>채널 분석</span></button>
        <button class="menu-item" data-page="videos">🎬 <span>영상 성적표</span></button>
        <button class="menu-item" data-page="growth">📈 <span>성장 추이</span></button>
        <button class="menu-item" data-page="advice">💡 <span>AI 어드바이스</span></button>
        <button class="menu-item" data-page="settings">⚙️ <span>설정</span></button>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h1 class="page-title">대시보드</h1>
        <div class="meta" style="margin-left:auto">데이터 기준: <span id="generated-at"></span></div>
        <button id="topRefresh" type="button" onclick="hardRefresh()" style="display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.4)">🔄 새로고침</button>
      </header>
      <main class="page" id="page"></main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/advice.js" onerror="this.remove()"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script>
    var TITLES = {
      ops: '운영현황',
      dashboard: '대시보드',
      channels: '채널 분석',
      videos: '영상 성적표',
      growth: '성장 추이',
      advice: 'AI 어드바이스',
      settings: '설정'
    };

    function hardRefresh() {
      var btn = document.getElementById('topRefresh');
      if (btn) { btn.textContent = '🔄 갱신 중…'; btn.disabled = true; }
      var done = function () { location.reload(true); };
      if (window.caches && caches.keys) {
        caches.keys().then(function (ks) {
          return Promise.all(ks.map(function (k) { return caches.delete(k); }));
        }).then(done).catch(done);
      } else { done(); }
    }

    function navigate(key) {
      if (!window.PAGES || !window.PAGES[key]) key = 'dashboard';
      var items = document.querySelectorAll('.menu-item');
      for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle('active', items[i].getAttribute('data-page') === key);
      }
      document.querySelector('.page-title').textContent = TITLES[key] || key;
      var root = document.getElementById('page');
      try {
        window.PAGES[key](root);
      } catch (err) {
        root.innerHTML = '';
        var card = document.createElement('div');
        card.className = 'card';
        card.textContent = '페이지를 불러오는 중 오류가 발생했습니다: ' + (err && err.message ? err.message : err);
        root.appendChild(card);
      }
      location.hash = key;
    }

    var menuItems = document.querySelectorAll('.menu-item');
    for (var i = 0; i < menuItems.length; i++) {
      menuItems[i].addEventListener('click', function () {
        navigate(this.getAttribute('data-page'));
      });
    }

    var genEl = document.getElementById('generated-at');
    if (window.DATA && window.DATA.generated_at) genEl.textContent = window.DATA.generated_at;

    var start = location.hash.slice(1);
    navigate(window.PAGES && window.PAGES[start] ? start : 'ops');

    // 안드로이드 Chrome '앱 설치' 요건 (https에서만)
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
</html>
