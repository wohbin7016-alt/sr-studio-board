<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SR스튜디오">
  <title>SR스튜디오 Analytics</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
  /* 당겨서 새로고침 (pull-to-refresh) — 버튼 제거, 상단서 당기면 갱신 (2026-06-19) */
  #ptr{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;height:60px;transform:translateY(-64px);color:#fff;font-size:14px;font-weight:700;z-index:9999;pointer-events:none;background:linear-gradient(#2563ebee,#2563eb00)}
  #ptr .ptrsp{width:20px;height:20px;border:2px solid #ffffff55;border-top-color:#fff;border-radius:50%}
  #ptr.spin .ptrsp{animation:ptrspin .7s linear infinite}
  @keyframes ptrspin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="ptr"><span class="ptrsp"></span><span id="ptrtx">↓ 당겨서 새로고침</span></div>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">SR<span>스튜디오</span> <small>Analytics</small></div>
      <nav class="menu">
        <button class="menu-item" data-page="ops">🏭 <span>운영현황</span></button>
        <button class="menu-item" data-page="dashboard">📊 <span>대시보드</span></button>
        <button class="menu-item" data-page="channels">📺 <span>채널 분석</span></button>
        <button class="menu-item" data-page="videos">🎬 <span>영상 성적표</span></button>
        <button class="menu-item" data-page="growth">📈 <span>성장 추이</span></button>
        <button class="menu-item" data-page="advice">💡 <span>AI 어드바이스</span></button>
        <button class="menu-item" data-page="settings">⚙️ <span>설정</span></button>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <h1 class="page-title">대시보드</h1>
        <div class="meta" style="margin-left:auto">데이터 기준: <span id="generated-at"></span></div>
      </header>
      <main class="page" id="page"></main>
    </div>
  </div>

  <script>document.write('<scr'+'ipt src="js/data.js?cb='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="js/advice.js?cb='+Date.now()+'" onerror="this.remove()"></scr'+'ipt>');</script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script>
    var TITLES = {
      ops: '운영현황',
      dashboard: '대시보드',
      channels: '채널 분석',
      videos: '영상 성적표',
      growth: '성장 추이',
      advice: 'AI 어드바이스',
      settings: '설정'
    };

    function hardRefresh() {
      var btn = document.getElementById('topRefresh');
      if (btn) { btn.textContent = '🔄 갱신 중…'; btn.disabled = true; }
      var done = function () { location.replace(location.pathname.split('?')[0] + '?_=' + Date.now() + location.hash); };
      if (window.caches && caches.keys) {
        caches.keys().then(function (ks) {
          return Promise.all(ks.map(function (k) { return caches.delete(k); }));
        }).then(done).catch(done);
      } else { done(); }
    }

    /* 당겨서 새로고침 — .main 최상단서 아래로 당기면 갱신 (2026-06-19) */
    (function(){
      var sc=document.querySelector('.main'),ptr=document.getElementById('ptr'),tx=document.getElementById('ptrtx');
      if(!sc||!ptr)return;
      var startY=0,pulling=false,dist=0,TH=70,MAX=90;
      sc.addEventListener('touchstart',function(e){
        if(sc.scrollTop<=0&&e.touches.length===1){startY=e.touches[0].clientY;pulling=true;dist=0;ptr.style.transition='none';}
      },{passive:true});
      sc.addEventListener('touchmove',function(e){
        if(!pulling)return;
        dist=e.touches[0].clientY-startY;
        if(dist<=0){pulling=false;ptr.style.transition='transform .2s';ptr.style.transform='translateY(-64px)';return;}
        var d=Math.min(dist*0.5,MAX);
        ptr.style.transform='translateY('+(d-64)+'px)';
        tx.textContent=d>=TH?'놓으면 새로고침':'↓ 당겨서 새로고침';
      },{passive:true});
      sc.addEventListener('touchend',function(){
        if(!pulling)return;pulling=false;ptr.style.transition='transform .25s ease';
        if(dist*0.5>=TH){ptr.classList.add('spin');ptr.style.transform='translateY(0)';tx.textContent='새로고침 중…';hardRefresh();}
        else{ptr.style.transform='translateY(-64px)';}
      },{passive:true});
    })();

    function navigate(key) {
      if (!window.PAGES || !window.PAGES[key]) key = 'dashboard';
      var items = document.querySelectorAll('.menu-item');
      for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle('active', items[i].getAttribute('data-page') === key);
      }
      document.querySelector('.page-title').textContent = TITLES[key] || key;
      var root = document.getElementById('page');
      try {
        window.PAGES[key](root);
      } catch (err) {
        root.innerHTML = '';
        var card = document.createElement('div');
        card.className = 'card';
        card.textContent = '페이지를 불러오는 중 오류가 발생했습니다: ' + (err && err.message ? err.message : err);
        root.appendChild(card);
      }
      location.hash = key;
    }

    var menuItems = document.querySelectorAll('.menu-item');
    for (var i = 0; i < menuItems.length; i++) {
      menuItems[i].addEventListener('click', function () {
        navigate(this.getAttribute('data-page'));
      });
    }

    var genEl = document.getElementById('generated-at');
    if (window.DATA && window.DATA.generated_at) genEl.textContent = window.DATA.generated_at;

    var start = location.hash.slice(1);
    navigate(window.PAGES && window.PAGES[start] ? start : 'ops');

    // 안드로이드 Chrome '앱 설치' 요건 (https에서만)
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
</html>
